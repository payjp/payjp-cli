name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X github.com/payjp/payjp-cli/internal/version.Version=$VERSION -X github.com/payjp/payjp-cli/internal/version.Commit=$COMMIT -X github.com/payjp/payjp-cli/internal/version.Date=$DATE"
          
          if [ "${{ matrix.os }}" = "windows" ]; then
            go build -ldflags "$LDFLAGS" -o dist/payjp-cli.exe .
          else
            go build -ldflags "$LDFLAGS" -o dist/payjp-cli .
          fi

      - name: Create archive
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip payjp-cli-${{ matrix.os }}-${{ matrix.arch }}.zip payjp-cli.exe
          else
            tar -czf payjp-cli-${{ matrix.os }}-${{ matrix.arch }}.tar.gz payjp-cli
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: payjp-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true